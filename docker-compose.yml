services:
  sortarr:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./credentials.json:/app/credentials.json:ro
    environment:
      - SORTARR_DATABASE_FILE=/data/sortarr.db
      - SORTARR_PICKLE_FILE=/data/credentials.pickle
      - SORTARR_CREDENTIALS_FILE=/app/credentials.json
      - SORTARR_SCHEDULE=0 */6 * * *
      - SORTARR_API_PORT=8080
      - SORTARR_LOG_LEVEL=info
      - SORTARR_COMPARE_DISTANCE=80
      - SORTARR_NO_WEBBROWSER=true