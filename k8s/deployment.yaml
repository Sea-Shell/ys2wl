apiVersion: apps/v1
kind: Deployment
metadata:
  name: sortarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sortarr
  template:
    metadata:
      labels:
        app: sortarr
    spec:
      containers:
        - name: sortarr
          image: registry.hub.docker.com/bateau/sortarr:v2.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: sortarr-config
          volumeMounts:
            - mountPath: /data
              name: config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - hostPath:
            path: /data/disk2/opt/sortarr
            type: ""
          name: config