<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0033"/>
      <stop offset="100%" style="stop-color:#ff3355"/>
    </linearGradient>
    <linearGradient id="c" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#00cc66"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="32" height="32" rx="6" fill="#0c0c0e"/>
  
  <!-- Flow path -->
  <path d="M6 16 Q14 16 16 14 Q18 12 20 12 Q24 12 26 16" 
        fill="none" stroke="url(#r)" stroke-width="1.5" filter="url(#glow)" stroke-linecap="round"/>
  
  <!-- Particles -->
  <circle cx="10" cy="15.5" r="1.2" fill="url(#r)" filter="url(#glow)"/>
  <circle cx="16" cy="13" r="1" fill="url(#c)" filter="url(#glow)"/>
  <circle cx="22" cy="15.5" r="1.2" fill="url(#g)" filter="url(#glow)"/>
  
  <!-- Sort arrows -->
  <path d="M4 8 L8 12 L4 16" stroke="url(#c)" stroke-width="1.2" fill="none" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M24 8 L28 12 L24 16" stroke="url(#g)" stroke-width="1.2" fill="none" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M24 18 L28 22 L24 26" stroke="url(#g)" stroke-width="1" fill="none" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  
  <!-- Playlist blocks -->
  <rect x="22" y="6" width="6" height="6" rx="1" fill="url(#g)" filter="url(#glow)" opacity="0.9"/>
  <rect x="22" y="14" width="6" height="6" rx="1" fill="url(#g)" filter="url(#glow)" opacity="0.5"/>
  <rect x="22" y="22" width="6" height="6" rx="1" fill="url(#g)" filter="url(#glow)" opacity="0.3"/>
  
  <!-- Source -->
  <circle cx="6" cy="16" r="2.5" fill="none" stroke="url(#c)" stroke-width="1.5" filter="url(#glow)"/>
  
  <!-- S mark -->
  <text x="16" y="18" font-family="monospace" font-size="7" font-weight="700" fill="url(#r)" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)" opacity="0.8">S</text>
</svg>