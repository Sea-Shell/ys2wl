<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Neon gradients -->
    <linearGradient id="neonRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0033;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff3355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0033;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ccff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc66;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- CRT scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Dark background with subtle grid -->
  <rect width="64" height="64" rx="12" fill="#0c0c0e"/>
  <rect width="64" height="64" rx="12" fill="url(#scanlines)"/>

  <!-- Central flow track -->
  <path d="M12 32 Q28 32 32 28 Q36 24 40 24 Q48 24 52 32" 
        fill="none" stroke="url(#neonRed)" stroke-width="2.5" 
        filter="url(#glowRed)" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Flow particles on track -->
  <circle cx="18" cy="31" r="2.5" fill="url(#neonRed)" filter="url(#glowRed)">
    <animate attributeName="cx" values="18;52;18" dur="3s" repeatCount="indefinite" calcMode="linear"/>
  </circle>
  <circle cx="32" cy="26" r="2" fill="url(#neonCyan)" filter="url(#glowCyan)">
    <animate attributeName="cx" values="32;52;12;32" dur="3s" repeatCount="indefinite" calcMode="linear" begin="0.5s"/>
    <animate attributeName="cy" values="26;32;32;26" dur="3s" repeatCount="indefinite" calcMode="linear" begin="0.5s"/>
  </circle>
  <circle cx="46" cy="31" r="2.5" fill="url(#neonGreen)" filter="url(#glowGreen)">
    <animate attributeName="cx" values="46;12;46" dur="3s" repeatCount="indefinite" calcMode="linear" begin="1s"/>
  </circle>

  <!-- Sort/arrange arrows (the "arr" in sortarr) -->
  <g fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left arrow (incoming) -->
    <path d="M10 18 L16 24 L10 30" stroke="url(#neonCyan)" filter="url(#glowCyan)"/>
    <!-- Right arrows (sorted output) -->
    <path d="M48 18 L54 24 L48 30" stroke="url(#neonGreen)" filter="url(#glowGreen)"/>
    <path d="M48 34 L54 40 L48 46" stroke="url(#neonGreen)" filter="url(#glowGreen)" opacity="0.7"/>
    <path d="M48 50 L54 44 L48 38" stroke="url(#neonGreen)" filter="url(#glowGreen)" opacity="0.5"/>
  </g>

  <!-- Playlist destination nodes -->
  <g>
    <rect x="46" y="16" width="12" height="12" rx="2" fill="url(#neonGreen)" filter="url(#glowGreen)" opacity="0.9"/>
    <rect x="46" y="32" width="12" height="12" rx="2" fill="url(#neonGreen)" filter="url(#glowGreen)" opacity="0.6"/>
    <rect x="46" y="48" width="12" height="12" rx="2" fill="url(#neonGreen)" filter="url(#glowGreen)" opacity="0.3"/>
  </g>

  <!-- Source subscription indicator -->
  <circle cx="10" cy="32" r="5" fill="none" stroke="url(#neonCyan)" stroke-width="2" filter="url(#glowCyan)">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- "S" letter mark for sortarr -->
  <text x="32" y="36" font-family="monospace" font-size="14" font-weight="700" 
        fill="url(#neonRed)" text-anchor="middle" dominant-baseline="middle"
        filter="url(#glowRed)" opacity="0.85">S</text>
</svg>