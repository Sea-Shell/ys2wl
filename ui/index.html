<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ys2wl</title>
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --accent: #38bdf8;
  --accent-hover: #7dd3fc;
  --success: #22c55e;
  --warning: #eab308;
  --error: #ef4444;
  --sidebar: 220px;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
}
.sidebar {
  width: var(--sidebar);
  background: var(--surface);
  padding: 1.5rem 0;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
}
.sidebar h1 {
  font-size: 1.25rem;
  font-weight: 700;
  padding: 0 1.25rem 1.5rem;
  color: var(--accent);
}
.sidebar a {
  display: block;
  padding: 0.625rem 1.25rem;
  color: var(--text2);
  text-decoration: none;
  font-size: 0.875rem;
  transition: background .15s, color .15s;
  cursor: pointer;
}
.sidebar a:hover,
.sidebar a.active {
  background: var(--surface2);
  color: var(--text);
}
.main {
  margin-left: var(--sidebar);
  flex: 1;
  padding: 1.5rem 2rem;
}
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--surface2);
  font-size: 0.875rem;
  color: var(--text2);
}
.health-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  margin-right: 0.5rem;
}
.page { display: none; }
.page.active { display: block; }
.page h2 { font-size: 1.5rem; margin-bottom: 1rem; }
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
}
.card h3 { font-size: 0.875rem; color: var(--text2); margin-bottom: 0.25rem; }
.card .value { font-size: 1.5rem; font-weight: 700; }
button, .btn {
  background: var(--accent);
  color: #0f172a;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 0.875rem;
  cursor: pointer;
  transition: background .15s;
}
button:hover { background: var(--accent-hover); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
th { text-align: left; padding: 0.5rem; color: var(--text2); border-bottom: 1px solid var(--surface2); }
td { padding: 0.5rem; border-bottom: 1px solid var(--surface2); }
tr:hover td { background: var(--surface2); }
.badge {
  display: inline-block; padding: 0.125rem 0.5rem;
  border-radius: 999px; font-size: 0.75rem; font-weight: 600;
}
.badge-ok { background: var(--success); color: #0f172a; }
.badge-fail { background: var(--error); color: #fff; }
.badge-run { background: var(--warning); color: #0f172a; }
input, select {
  background: var(--bg); color: var(--text); border: 1px solid var(--surface2);
  padding: 0.5rem; border-radius: var(--radius); font-size: 0.875rem; width: 100%;
}
label { display: block; font-size: 0.875rem; color: var(--text2); margin-bottom: 0.25rem; }
.form-group { margin-bottom: 1rem; }
.toast {
  position: fixed; top: 1rem; right: 1rem; padding: 0.75rem 1rem;
  border-radius: var(--radius); font-size: 0.875rem; font-weight: 600;
  z-index: 1000; display: none;
}
.toast.error { background: var(--error); color: #fff; display: block; }
.toast.success { background: var(--success); color: #0f172a; display: block; }
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--surface2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .6s linear infinite;
  vertical-align: middle; margin-right: 0.5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.config-tab { background:var(--surface2); color:var(--text); border:none; padding:0.5rem 1rem; border-radius:var(--radius); font-weight:600; font-size:0.875rem; cursor:pointer; }
.config-tab.active { background:var(--accent); color:#0f172a; }
.config-pane { max-width:520px; }
</style>
</head>
<body>

<nav class="sidebar" id="sidebar">
  <h1>ys2wl</h1>
  <a class="active" data-page="dashboard" href="#dashboard">Dashboard</a>
  <a data-page="subscriptions" href="#subscriptions">Subscriptions</a>
  <a data-page="rules" href="#rules">Routing Rules</a>
  <a data-page="config" href="#config">Config</a>
  <a data-page="runs" href="#runs">Pipeline Runs</a>
  <a data-page="stats" href="#stats">Stats</a>
  <a data-page="auth" href="#auth">Auth</a>
</nav>

<div class="main">
  <div class="topbar">
    <span><span class="health-dot" id="healthDot"></span><span id="healthText">loading...</span></span>
    <span id="lastRunText"></span>
  </div>

  <section id="dashboard" class="page active">
    <h2>Dashboard</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem">
      <div class="card"><h3>Subscriptions</h3><div class="value" id="statSubs">-</div></div>
      <div class="card"><h3>Routing Rules</h3><div class="value" id="statRules">-</div></div>
      <div class="card"><h3>Last Run</h3><div class="value" id="statLastRun">-</div></div>
      <div class="card"><h3>Videos Added</h3><div class="value" id="statVideosAdded">-</div></div>
    </div>
    <button id="triggerBtn">▶ Run Pipeline</button>
    <div id="triggerResult" style="margin-top:0.75rem"></div>
  </section>
  <section id="subscriptions" class="page">
    <h2>Subscriptions</h2>
    <input id="subSearch" placeholder="Filter channels..." style="max-width:300px;margin-bottom:1rem">
    <div id="subList"></div>
  </section>
  <section id="rules" class="page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h2 style="margin:0">Routing Rules</h2>
      <button id="addRuleBtn">+ Add Rule</button>
    </div>
    <div id="rulesList"></div>
    <div id="ruleModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;
         align-items:center;justify-content:center">
      <div style="background:var(--surface);padding:2rem;border-radius:var(--radius);width:480px;max-width:90vw">
        <h3 id="ruleModalTitle" style="margin-bottom:1rem">Add Rule</h3>
        <input type="hidden" id="ruleId">
        <div class="form-group"><label>Name</label><input id="ruleName"></div>
        <div class="form-group"><label>Priority</label><input id="rulePriority" type="number" value="0"></div>
        <div class="form-group"><label>Field</label>
          <select id="ruleField"><option value="">Any</option><option value="video_title">Title</option>
          <option value="channel_title">Channel Title</option><option value="duration_seconds">Duration</option></select></div>
        <div class="form-group"><label>Operator</label>
          <select id="ruleOperator"><option>contains</option><option>regex</option><option>eq</option>
          <option>lt</option><option>gt</option></select></div>
        <div class="form-group"><label>Pattern</label><input id="rulePattern" placeholder="leave empty to match all (contains/regex only)"></div>
        <div class="form-group"><label>Destination Playlist ID</label><input id="ruleDestId"></div>
        <div class="form-group"><label>Destination Playlist Title</label><input id="ruleDestTitle"></div>
        <div style="display:flex;gap:1rem">
          <div class="form-group" style="flex:1"><label>Minimum Length</label><input id="ruleMinLength" value="0s"></div>
          <div class="form-group" style="flex:1"><label>Maximum Length</label><input id="ruleMaxLength" value="0s"></div>
        </div>
        <div class="form-group"><label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer"><input type="checkbox" id="ruleCatchAll" style="width:auto"> Catch-all (no field/pattern needed)</label></div>
        <div style="display:flex;gap:0.5rem;justify-content:flex-end">
          <button id="ruleCancel" style="background:var(--surface2);color:var(--text)">Cancel</button>
          <button id="ruleSave">Save</button>
        </div>
      </div>
    </div>
  </section>
  <section id="config" class="page">
    <h2>Config</h2>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem">
      <button class="config-tab active" data-tab="runtime">Runtime</button>
      <button class="config-tab" data-tab="credentials">Credentials</button>
      <button class="config-tab" data-tab="ignores">Ignore Lists</button>
    </div>
    <div id="configRuntime" class="config-pane"></div>
    <div id="configCredentials" class="config-pane" style="display:none"></div>
    <div id="configIgnores" class="config-pane" style="display:none"></div>
  </section>
  <section id="runs" class="page">
    <h2>Pipeline Runs</h2>
    <div id="runsList"></div>
  </section>
  <section id="run-detail" class="page">
    <h2>Run Details</h2>
    <div id="runDetailSummary"></div>
    <p><a href="#runs" style="color:var(--accent);cursor:pointer">&larr; Back to Runs</a></p>
    <div id="runDetailDecisions"><p style="color:var(--text2)">Loading...</p></div>
  </section>
  <section id="stats" class="page">
    <h2>Stats</h2>
    <div id="statsTable"></div>
  </section>
  <section id="auth" class="page">
    <h2>Authentication</h2>
    <div id="authStatus"></div>
  </section>
</div>

<div id="toast" class="toast"></div>

<script>
// ---- API wrapper ----
async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...opts.headers },
  });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`${res.status}: ${body}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

function showToast(msg, type = 'error') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type}`;
  setTimeout(() => { t.className = 'toast'; }, 4000);
}

function escapeHtml(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s); return d.innerHTML;
}

// ---- Routing ----
const PAGES = ['dashboard','subscriptions','rules','config','runs','stats','auth'];

function navigate(page) {
  location.hash = '#' + page;
}

function renderPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById(page);
  if (el) el.classList.add('active');
  const link = document.querySelector(`.sidebar a[data-page="${page}"]`);
  if (link) link.classList.add('active');
  if (typeof renderers[page] === 'function') renderers[page]();
}

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1) || 'dashboard';
  const runMatch = hash.match(/^run-detail-(\d+)$/);
  if (runMatch) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    document.getElementById('run-detail').classList.add('active');
    renderers.runDetail(parseInt(runMatch[1]));
  } else if (PAGES.includes(hash)) {
    renderPage(hash);
  } else {
    navigate('dashboard');
  }
});

// ---- Health check ----
async function updateHealth() {
  try {
    const data = await api('/api/health');
    document.getElementById('healthDot').style.background = 'var(--success)';
    document.getElementById('healthText').textContent = 'healthy';
  } catch {
    document.getElementById('healthDot').style.background = 'var(--error)';
    document.getElementById('healthText').textContent = 'unreachable';
  }
}

// ---- Dashboard renderer ----
const renderers = {};
renderers.dashboard = async function() {
  try {
    const [subs, rules, runs] = await Promise.all([
      api('/api/subscriptions'),
      api('/api/rules'),
      api('/api/pipeline/runs'),
    ]);
    document.getElementById('statSubs').textContent = Array.isArray(subs) ? subs.length : '-';
    document.getElementById('statRules').textContent = Array.isArray(rules) ? rules.length : '-';
    if (Array.isArray(runs) && runs.length > 0) {
      const last = runs[0];
      document.getElementById('statLastRun').textContent = last.status || '-';
      document.getElementById('statVideosAdded').textContent = last.videos_added ?? '-';
    }
  } catch { /* cards stay as '-' */ }
};

// ---- Trigger ----
document.getElementById('triggerBtn')?.addEventListener('click', async function() {
  this.disabled = true; this.innerHTML = '<span class="spinner"></span>Running...';
  document.getElementById('triggerResult').innerHTML = '';
  try {
    const data = await api('/api/pipeline/trigger', { method: 'POST' });
    showToast('Pipeline started (run #' + data.run_id + ')', 'success');
    renderers.dashboard();
  } catch (e) {
    document.getElementById('triggerResult').innerHTML =
      '<span style="color:var(--error)">' + e.message + '</span>';
  } finally {
    this.disabled = false; this.textContent = '▶ Run Pipeline';
  }
});

// ---- Subscriptions renderer ----
renderers.subscriptions = async function() {
  const container = document.getElementById('subList');
  container.innerHTML = '<p style="color:var(--text2)">Loading...</p>';
  try {
    const subs = await api('/api/subscriptions');
    container.innerHTML = `<table><thead><tr><th>Channel</th><th>Channel ID</th></tr></thead>
      <tbody>${Array.isArray(subs) ? subs.map(s => `<tr data-cid="${escapeHtml(s.channel_id)}" class="sub-row" style="cursor:pointer">
        <td>${escapeHtml(s.title)}</td><td style="color:var(--text2);font-size:0.75rem">${escapeHtml(s.channel_id)}</td>
      </tr>`).join('') : ''}</tbody></table>`;
    document.getElementById('subSearch').oninput = function() {
      const q = this.value.toLowerCase();
      document.querySelectorAll('.sub-row').forEach(r => {
        r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    };
    document.querySelectorAll('.sub-row').forEach(r => {
      r.addEventListener('click', async function() {
        const cid = this.dataset.cid;
        const next = this.nextElementSibling;
        if (next && next.classList.contains('activity-row')) {
          next.remove(); return;
        }
        try {
          const acts = await api('/api/subscriptions/' + encodeURIComponent(cid) + '/activity');
          const row = document.createElement('tr'); row.className = 'activity-row';
          row.innerHTML = `<td colspan="2" style="padding:0.5rem 1rem">
            <table style="font-size:0.75rem">
              <thead><tr><th>Video</th><th>Type</th><th>Published</th></tr></thead>
              <tbody>${Array.isArray(acts) ? acts.map(a => `<tr>
                <td>${escapeHtml(a.title)}</td><td>${a.video_type}</td><td>${a.published_at}</td>
              </tr>`).join('') : ''}</tbody></table>
          </td>`;
          this.parentNode.insertBefore(row, this.nextSibling);
        } catch { showToast('Failed to load activity'); }
      });
    });
  } catch { container.innerHTML = '<p style="color:var(--error)">Failed to load subscriptions</p>'; }
};

// ---- Rules renderer + modal ----
renderers.rules = async function() {
  const container = document.getElementById('rulesList');
  container.innerHTML = '<p style="color:var(--text2)">Loading...</p>';
  try {
    const rules = await api('/api/rules');
    if (!Array.isArray(rules) || rules.length === 0) {
      container.innerHTML = '<p style="color:var(--text2)">No rules configured</p>'; return;
    }
    container.innerHTML = `<table><thead><tr>
      <th>Name</th><th>Priority</th><th>Pattern</th><th>Min</th><th>Max</th><th>Catch-all</th><th>Destination</th><th>Enabled</th><th></th>
    </tr></thead><tbody>${rules.map(r => `<tr>
      <td>${escapeHtml(r.name)}</td>
      <td>${r.priority}</td>
      <td style="font-family:monospace;font-size:0.75rem">${escapeHtml(r.pattern || '-')}</td>
      <td style="font-size:0.75rem">${r.minimum_length && r.minimum_length !== '0s' ? r.minimum_length : '-'}</td>
      <td style="font-size:0.75rem">${r.maximum_length && r.maximum_length !== '0s' ? r.maximum_length : '-'}</td>
      <td>${r.catch_all ? '✓' : ''}</td>
      <td style="font-size:0.75rem;color:var(--text2)">${escapeHtml(r.destination_playlist_id)}</td>
      <td><input type="checkbox" ${r.enabled ? 'checked' : ''} data-rid="${r.id}" class="toggle-rule"></td>
      <td><button class="edit-rule" data-rid="${r.id}" style="background:var(--surface2);color:var(--text);padding:0.25rem 0.5rem;font-size:0.75rem">Edit</button>
      <button class="del-rule" data-rid="${r.id}" style="background:var(--error);color:#fff;padding:0.25rem 0.5rem;font-size:0.75rem">Del</button></td>
    </tr>`).join('')}</tbody></table>`;

    document.querySelectorAll('.toggle-rule').forEach(cb => {
      cb.addEventListener('change', async function() {
        try {
          await api('/api/rules/' + this.dataset.rid, {
            method: 'PUT', body: JSON.stringify({ enabled: this.checked }),
          });
        } catch (e) { showToast('Toggle failed: ' + e.message); }
      });
    });
    document.querySelectorAll('.del-rule').forEach(btn => {
      btn.addEventListener('click', async function() {
        if (!confirm('Delete this rule?')) return;
        try {
          await api('/api/rules/' + this.dataset.rid, { method: 'DELETE' });
          renderers.rules();
        } catch (e) { showToast('Delete failed: ' + e.message); }
      });
    });
    document.querySelectorAll('.edit-rule').forEach(btn => {
      btn.addEventListener('click', function() {
        const row = rules.find(r => r.id == this.dataset.rid);
        if (row) openRuleModal(row);
      });
    });
  } catch { container.innerHTML = '<p style="color:var(--error)">Failed to load rules</p>'; }
};

function openRuleModal(rule) {
  const modal = document.getElementById('ruleModal');
  document.getElementById('ruleModalTitle').textContent = rule ? 'Edit Rule' : 'Add Rule';
  document.getElementById('ruleId').value = rule ? rule.id : '';
  document.getElementById('ruleName').value = rule ? rule.name : '';
  document.getElementById('rulePriority').value = rule ? rule.priority : 0;
  document.getElementById('ruleField').value = rule ? (rule.field || '') : '';
  document.getElementById('ruleOperator').value = rule ? rule.operator : 'contains';
  document.getElementById('rulePattern').value = rule ? (rule.pattern || '') : '';
  document.getElementById('ruleDestId').value = rule ? rule.destination_playlist_id : '';
  document.getElementById('ruleDestTitle').value = rule ? rule.destination_playlist_title : '';
  document.getElementById('ruleMinLength').value = rule ? (rule.minimum_length || '0s') : '0s';
  document.getElementById('ruleMaxLength').value = rule ? (rule.maximum_length || '0s') : '0s';
  document.getElementById('ruleCatchAll').checked = rule ? rule.catch_all : false;
  modal.style.display = 'flex';
}

document.getElementById('addRuleBtn')?.addEventListener('click', () => openRuleModal(null));
document.getElementById('ruleCancel')?.addEventListener('click', () => {
  document.getElementById('ruleModal').style.display = 'none';
});
document.getElementById('ruleSave')?.addEventListener('click', async function() {
  const id = document.getElementById('ruleId').value;
  const body = {
    name: document.getElementById('ruleName').value,
    priority: parseInt(document.getElementById('rulePriority').value) || 0,
    field: document.getElementById('ruleField').value || null,
    operator: document.getElementById('ruleOperator').value,
    pattern: document.getElementById('rulePattern').value,
    destination_playlist_id: document.getElementById('ruleDestId').value,
    destination_playlist_title: document.getElementById('ruleDestTitle').value,
    minimum_length: document.getElementById('ruleMinLength').value,
    maximum_length: document.getElementById('ruleMaxLength').value,
    catch_all: document.getElementById('ruleCatchAll').checked,
  };
  try {
    if (id) {
      await api('/api/rules/' + id, { method: 'PUT', body: JSON.stringify(body) });
      showToast('Rule updated', 'success');
    } else {
      await api('/api/rules', { method: 'POST', body: JSON.stringify(body) });
      showToast('Rule created', 'success');
    }
    document.getElementById('ruleModal').style.display = 'none';
    renderers.rules();
  } catch (e) { showToast('Save failed: ' + e.message); }
});

// ---- Config renderers ----
renderers.configRuntime = async function() {
  const container = document.getElementById('configRuntime');
  container.innerHTML = '<p style="color:var(--text2)">Loading...</p>';
  try {
    const cfg = await api('/api/config');
    const fields = [
      ['schedule', 'Schedule (cron)', 'text'],
      ['compare_distance', 'Compare Distance (0-100)', 'number'],
      ['reprocess_days', 'Reprocess Days', 'number'],
      ['playlist_sleep', 'Playlist Sleep (s)', 'number'],
      ['subscription_sleep', 'Subscription Sleep (s)', 'number'],
      ['pipeline_concurrency', 'Pipeline Concurrency', 'number'],
      ['activity_limit', 'Activity Limit', 'number'],
      ['subscription_limit', 'Subscription Limit', 'number'],
      ['published_after', 'Published After (ISO date)', 'text'],
      ['no_webbrowser', 'No Webbrowser', 'checkbox'],
      ['log_level', 'Log Level', 'text'],
      ['public_url', 'Public URL', 'text'],
    ];
    container.innerHTML = fields.map(([key, label, type]) =>
      type === 'checkbox'
        ? `<div class="form-group"><label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">
            <input type="checkbox" id="cfg_${key}" ${cfg[key] ? 'checked' : ''} style="width:auto">
            ${label}</label></div>`
        : `<div class="form-group"><label>${label}</label>
            <input type="${type}" id="cfg_${key}" value="${escapeHtml(String(cfg[key] ?? ''))}"></div>`
    ).join('') + '<button id="configSaveRuntime" style="margin-top:0.5rem">Save Config</button>';
    document.getElementById('configSaveRuntime').onclick = async function() {
      const body = {};
      fields.forEach(([key]) => {
        const el = document.getElementById('cfg_' + key);
        if (el.type === 'checkbox') {
          body[key] = el.checked;
        } else {
          body[key] = el.value;
        }
      });
      try {
        await api('/api/config', { method: 'PUT', body: JSON.stringify(body) });
        showToast('Config saved', 'success');
      } catch (e) { showToast('Save failed: ' + e.message); }
    };
  } catch { container.innerHTML = '<p style="color:var(--error)">Failed to load config</p>'; }
};

renderers.configCredentials = async function() {
  const container = document.getElementById('configCredentials');
  container.innerHTML = '<p style="color:var(--text2)">Loading...</p>';
  try {
    const cfg = await api('/api/config');
    container.innerHTML = `
      <div class="card"><h3>Client Secret JSON</h3>
      <p style="color:var(--text2);font-size:0.75rem;margin-bottom:0.5rem">Paste the contents of your Google OAuth client_secret.json file here.</p>
      <textarea id="cfg_credentials_file" rows="12" style="font-family:monospace;font-size:0.75rem;width:100%;background:var(--bg);color:var(--text);border:1px solid var(--surface2);padding:0.5rem;border-radius:var(--radius)">${escapeHtml(cfg.credentials_file || '')}</textarea>
      <button id="saveCredentialsBtn" style="margin-top:0.75rem">Save Credentials</button></div>`;
    document.getElementById('saveCredentialsBtn').onclick = async () => {
      try {
        await api('/api/config', {
          method: 'PUT',
          body: JSON.stringify({ credentials_file: document.getElementById('cfg_credentials_file').value })
        });
        showToast('Credentials saved', 'success');
      } catch (e) { showToast('Save failed: ' + e.message); }
    };
  } catch { container.innerHTML = '<p style="color:var(--error)">Failed to load</p>'; }
};

renderers.configIgnores = async function() {
  let ignoreType = 'subscription';
  const container = document.getElementById('configIgnores');
  async function loadEntries(type) {
    const entries = await api(`/api/config/ignores?type=${type}`);
    document.getElementById('ignoreTableBody').innerHTML = entries.length === 0
      ? '<tr><td style="color:var(--text2)">No entries</td><td></td></tr>'
      : entries.map(e => `<tr>
        <td>${escapeHtml(e.pattern)}</td>
        <td><button class="del-ignore" data-id="${e.id}" style="background:var(--error);color:#fff;padding:0.25rem 0.5rem;font-size:0.75rem;border:none;border-radius:4px;cursor:pointer">Del</button></td>
      </tr>`).join('');
    document.querySelectorAll('.del-ignore').forEach(btn => {
      btn.onclick = async function() {
        try {
          await api(`/api/config/ignores/${this.dataset.id}`, { method: 'DELETE' });
          loadEntries(ignoreType);
        } catch (e) { showToast('Delete failed: ' + e.message); }
      };
    });
  }
  function render() {
    container.innerHTML = `
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem">
        ${['subscription','video','words'].map(t =>
          `<button class="config-tab ${t === ignoreType ? 'active' : ''}" data-itype="${t}">${t}</button>`
        ).join('')}
      </div>
      <div class="form-group" style="display:flex;gap:0.5rem">
        <input id="newIgnorePattern" placeholder="Add pattern..." style="flex:1">
        <button id="addIgnoreBtn">Add</button>
      </div>
      <table style="width:100%"><thead><tr><th>Pattern</th><th></th></tr></thead>
      <tbody id="ignoreTableBody"><tr><td style="color:var(--text2)">Loading...</td><td></td></tr></tbody></table>`;
    loadEntries(ignoreType);
  }
  render();
  container.onclick = function(e) {
    const tab = e.target.closest('[data-itype]');
    if (tab) { ignoreType = tab.dataset.itype; render(); return; }
    if (e.target.id === 'addIgnoreBtn') {
      const input = document.getElementById('newIgnorePattern');
      if (!input.value.trim()) return;
      api('/api/config/ignores', {
        method: 'POST',
        body: JSON.stringify({ type: ignoreType, pattern: input.value.trim() })
      }).then(() => {
        input.value = '';
        loadEntries(ignoreType);
        showToast('Entry added', 'success');
      }).catch(e => showToast('Add failed: ' + e.message));
    }
  };
};

renderers.config = async function() {
  renderers.configRuntime();
  renderers.configCredentials();
  renderers.configIgnores();
  document.querySelectorAll('.config-tab[data-tab]').forEach(btn => {
    btn.onclick = function() {
      document.querySelectorAll('.config-tab').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      document.querySelectorAll('.config-pane').forEach(p => p.style.display = 'none');
      const tabId = 'config' + this.dataset.tab.charAt(0).toUpperCase() + this.dataset.tab.slice(1);
      document.getElementById(tabId).style.display = 'block';
    };
  });
};

function statusBadge(status) {
  if (!status) return '<span class="badge badge-run">-</span>';
  if (status === 'completed' || status === 'success') return '<span class="badge badge-ok">completed</span>';
  if (status === 'failed' || status === 'completed_with_errors') return '<span class="badge badge-fail">' + status.replace(/_/g,' ') + '</span>';
  return '<span class="badge badge-run">' + status + '</span>';
}

// ---- Pipeline Runs renderer ----
renderers.runs = async function() {
  const container = document.getElementById('runsList');
  container.innerHTML = '<p style="color:var(--text2)">Loading...</p>';
  try {
    const runs = await api('/api/pipeline/runs');
    if (!Array.isArray(runs) || runs.length === 0) {
      container.innerHTML = '<p style="color:var(--text2)">No runs yet</p>'; return;
    }
    container.innerHTML = `<table><thead><tr>
      <th>ID</th><th>Started</th><th>Status</th><th>Trigger</th><th>Subs Proc</th><th>Subs Skip</th><th>Added</th><th>Vid Skip</th><th>Errors</th>
    </tr></thead><tbody>${runs.map(r => `<tr style="cursor:pointer" onclick="location.hash='#run-detail-${r.id}'">
      <td>${r.id}</td>
      <td style="font-size:0.75rem;color:var(--text2)">${r.started_at || '-'}</td>
      <td>${statusBadge(r.status)}</td>
      <td>${r.trigger || '-'}</td>
      <td>${r.subscriptions_processed ?? '-'}</td>
      <td>${r.subscriptions_skipped ?? '-'}</td>
      <td>${r.videos_added ?? '-'}</td>
      <td>${r.videos_skipped ?? '-'}</td>
      <td>${r.errors ?? '-'}</td>
    </tr>`).join('')}</tbody></table>`;
  } catch { container.innerHTML = '<p style="color:var(--error)">Failed to load runs</p>'; }
};

renderers.runDetail = async function(runId) {
  const summaryEl = document.getElementById('runDetailSummary');
  const decisionsEl = document.getElementById('runDetailDecisions');
  decisionsEl.innerHTML = '<p style="color:var(--text2)">Loading...</p>';
  try {
    const [run, decisions] = await Promise.all([
      api('/api/pipeline/runs/' + runId),
      api('/api/pipeline/runs/' + runId + '/decisions'),
    ]);
    summaryEl.innerHTML = `<div class="card" style="margin-bottom:1rem">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.5rem">
        <div><strong>Run #${run.id}</strong></div>
        <div>Status: ${statusBadge(run.status)}</div>
        <div>Started: <span style="color:var(--text2);font-size:0.75rem">${run.started_at || '-'}</span></div>
        <div>Finished: <span style="color:var(--text2);font-size:0.75rem">${run.finished_at || '-'}</span></div>
        <div>Subs Processed: ${run.subscriptions_processed ?? '-'}</div>
        <div>Subs Skipped: ${run.subscriptions_skipped ?? '-'}</div>
        <div>Videos Added: ${run.videos_added ?? '-'}</div>
        <div>Videos Skipped: ${run.videos_skipped ?? '-'}</div>
        <div>Errors: ${run.errors ?? '-'}</div>
      </div>
    </div>`;
    if (!Array.isArray(decisions) || decisions.length === 0) {
      decisionsEl.innerHTML = '<p style="color:var(--text2)">No decisions logged for this run</p>'; return;
    }
    const videoDecisions = decisions.filter(d => d.action !== 'subscription_skipped');
    const subSkips = decisions.filter(d => d.action === 'subscription_skipped');
    const counts = { added: 0, skipped: 0, error: 0, sub_skipped: subSkips.length };
    videoDecisions.forEach(d => { if (d.action === 'added') counts.added++; else if (d.action === 'error') counts.error++; else counts.skipped++; });
    let html = '';
    if (subSkips.length) {
      html += `<div style="margin-bottom:1rem"><h4>Subscription Skips</h4>${subSkips.map(s => `<div style="padding:0.25rem 0;border-bottom:1px solid var(--border)"><strong>${escapeHtml(s.title)}</strong> &mdash; ${escapeHtml(s.reason_detail || s.reason)}</div>`).join('')}</div>`;
    }
    html += `<table><thead><tr>
      <th>Video</th><th>Channel</th><th>Action</th><th>Reason</th><th>Routed To</th>
    </tr></thead><tbody>${videoDecisions.map(d => `<tr>
      <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis">${escapeHtml(d.title)}</td>
      <td>${escapeHtml(d.subscription_title)}</td>
      <td><span class="badge ${d.action === 'added' ? 'badge-ok' : d.action === 'error' ? 'badge-fail' : 'badge-run'}">${d.action}</span></td>
      <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis">${escapeHtml(d.reason_detail || d.reason || '-')}</td>
      <td>${escapeHtml(d.routed_to || '-')}</td>
    </tr>`).join('')}</tbody></table>`;
    if (videoDecisions.length === 0) {
      html += '<p style="color:var(--text2)">No video decisions</p>';
    }
    html += `<p style="color:var(--text2);font-size:0.75rem">${decisions.length} decision(s) &mdash; subs skipped: ${counts.sub_skipped}, added: ${counts.added}, videos skipped: ${counts.skipped}, errors: ${counts.error}</p>`;
    decisionsEl.innerHTML = html;
  } catch (e) { decisionsEl.innerHTML = '<p style="color:var(--error)">Failed to load run details: ' + e.message + '</p>'; }
};

renderers.stats = async function() {
  const container = document.getElementById('statsTable');
  container.innerHTML = '<p style="color:var(--text2)">Loading...</p>';
  try {
    const data = await api('/api/stats/subscriptions');
    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = '<p style="color:var(--text2)">No data yet</p>'; return;
    }
    let sortCol = 'videos_added';
    let sortDir = 'desc';
    window.setStatsSort = function(col) {
      if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortCol = col; sortDir = col === 'subscription_title' ? 'asc' : 'desc'; }
      renderTable();
    };
    function renderTable() {
      const sorted = [...data].sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb || '').toLowerCase(); }
        if (va == null) va = '';
        if (vb == null) vb = '';
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });
      const arrow = (col) => sortCol === col ? (sortDir === 'asc' ? ' \u2191' : ' \u2193') : '';
      const statusClass = (s) => s === 'active' ? 'badge-ok' : s === 'ignored' ? 'badge-run' : '';
      container.innerHTML = `<table><thead><tr>
        <th style="cursor:pointer" onclick="setStatsSort('subscription_title')">Subscription${arrow('subscription_title')}</th>
        <th style="cursor:pointer" onclick="setStatsSort('videos_added')">Videos Added${arrow('videos_added')}</th>
        <th style="cursor:pointer" onclick="setStatsSort('last_added_at')">Last Added${arrow('last_added_at')}</th>
        <th style="cursor:pointer" onclick="setStatsSort('status')">Status${arrow('status')}</th>
      </tr></thead><tbody>${sorted.map(d => `<tr>
        <td>${escapeHtml(d.subscription_title)}</td>
        <td>${d.videos_added}</td>
        <td style="font-size:0.75rem;color:var(--text2)">${d.last_added_at || '-'}</td>
        <td><span class="badge ${statusClass(d.status)}">${d.status}</span></td>
      </tr>`).join('')}</tbody></table>
      <p style="color:var(--text2);font-size:0.75rem">${data.length} subscription(s)</p>`;
    }
    renderTable();
  } catch (e) { container.innerHTML = '<p style="color:var(--error)">Failed to load stats: ' + e.message + '</p>'; }
};

// ---- Auth renderer ----
renderers.auth = async function() {
  const container = document.getElementById('authStatus');
  container.innerHTML = '<p style="color:var(--text2)">Checking...</p>';
  try {
    const status = await api('/api/auth/status');
    if (status.authenticated) {
      container.innerHTML = `
        <div class="card" style="border-left:4px solid var(--success)">
          <h3>✅ Authenticated</h3>
          <p style="color:var(--text2);margin-top:0.5rem">Expires: ${status.expires_at || 'Unknown'}</p>
        </div>
        <button id="reauthBtn" style="margin-top:0.5rem;background:var(--surface2);color:var(--text)">Re-authenticate</button>`;
      document.getElementById('reauthBtn')?.addEventListener('click', startAuthFlow);
    } else {
      container.innerHTML = `
        <div class="card" style="border-left:4px solid var(--error)">
          <h3>❌ Not Authenticated</h3>
          <p style="color:var(--text2);margin-top:0.5rem">Authenticate with Google to enable YouTube API access.</p>
        </div>
        <button id="authBtn" style="margin-top:0.5rem">Authenticate with Google</button>`;
      document.getElementById('authBtn')?.addEventListener('click', startAuthFlow);
    }
  } catch {
    container.innerHTML = '<p style="color:var(--error)">Failed to check auth status</p>';
  }
};

async function startAuthFlow() {
  try {
    const data = await api('/api/auth/login');
    window.open(data.authorization_url, '_blank');
    document.getElementById('authStatus').innerHTML = `
      <div class="card">
        <h3 style="margin-bottom:0.5rem">Google Authorization</h3>
        <p style="color:var(--text2)">Opened Google consent page in a new tab.</p>
        <p style="color:var(--text2);margin-top:0.5rem">After authorizing, you will be redirected back to this app.</p>
        <button id="checkAuthBtn" style="margin-top:1rem">Check Auth Status</button>
      </div>`;
    document.getElementById('checkAuthBtn')?.addEventListener('click', () => renderers.auth());
  } catch (e) {
    document.getElementById('authStatus').innerHTML =
      '<p style="color:var(--error)">Failed: ' + e.message + '</p>';
  }
}

// ---- Init ----
if (!location.hash) navigate('dashboard');
renderPage(location.hash.slice(1) || 'dashboard');
updateHealth();
setInterval(updateHealth, 30000);
</script>
