<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ys2wl</title>
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --accent: #38bdf8;
  --accent-hover: #7dd3fc;
  --success: #22c55e;
  --warning: #eab308;
  --error: #ef4444;
  --sidebar: 220px;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
}
.sidebar {
  width: var(--sidebar);
  background: var(--surface);
  padding: 1.5rem 0;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
}
.sidebar h1 {
  font-size: 1.25rem;
  font-weight: 700;
  padding: 0 1.25rem 1.5rem;
  color: var(--accent);
}
.sidebar a {
  display: block;
  padding: 0.625rem 1.25rem;
  color: var(--text2);
  text-decoration: none;
  font-size: 0.875rem;
  transition: background .15s, color .15s;
  cursor: pointer;
}
.sidebar a:hover,
.sidebar a.active {
  background: var(--surface2);
  color: var(--text);
}
.main {
  margin-left: var(--sidebar);
  flex: 1;
  padding: 1.5rem 2rem;
}
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--surface2);
  font-size: 0.875rem;
  color: var(--text2);
}
.health-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  margin-right: 0.5rem;
}
.page { display: none; }
.page.active { display: block; }
.page h2 { font-size: 1.5rem; margin-bottom: 1rem; }
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
}
.card h3 { font-size: 0.875rem; color: var(--text2); margin-bottom: 0.25rem; }
.card .value { font-size: 1.5rem; font-weight: 700; }
button, .btn {
  background: var(--accent);
  color: #0f172a;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 0.875rem;
  cursor: pointer;
  transition: background .15s;
}
button:hover { background: var(--accent-hover); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
th { text-align: left; padding: 0.5rem; color: var(--text2); border-bottom: 1px solid var(--surface2); }
td { padding: 0.5rem; border-bottom: 1px solid var(--surface2); }
tr:hover td { background: var(--surface2); }
.badge {
  display: inline-block; padding: 0.125rem 0.5rem;
  border-radius: 999px; font-size: 0.75rem; font-weight: 600;
}
.badge-ok { background: var(--success); color: #0f172a; }
.badge-fail { background: var(--error); color: #fff; }
.badge-run { background: var(--warning); color: #0f172a; }
input, select {
  background: var(--bg); color: var(--text); border: 1px solid var(--surface2);
  padding: 0.5rem; border-radius: var(--radius); font-size: 0.875rem; width: 100%;
}
label { display: block; font-size: 0.875rem; color: var(--text2); margin-bottom: 0.25rem; }
.form-group { margin-bottom: 1rem; }
.toast {
  position: fixed; top: 1rem; right: 1rem; padding: 0.75rem 1rem;
  border-radius: var(--radius); font-size: 0.875rem; font-weight: 600;
  z-index: 1000; display: none;
}
.toast.error { background: var(--error); color: #fff; display: block; }
.toast.success { background: var(--success); color: #0f172a; display: block; }
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--surface2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .6s linear infinite;
  vertical-align: middle; margin-right: 0.5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav class="sidebar" id="sidebar">
  <h1>ys2wl</h1>
  <a class="active" data-page="dashboard">Dashboard</a>
  <a data-page="subscriptions">Subscriptions</a>
  <a data-page="rules">Routing Rules</a>
  <a data-page="config">Config</a>
  <a data-page="runs">Pipeline Runs</a>
</nav>

<div class="main">
  <div class="topbar">
    <span><span class="health-dot" id="healthDot"></span><span id="healthText">loading...</span></span>
    <span id="lastRunText"></span>
  </div>

  <section id="dashboard" class="page active">
    <h2>Dashboard</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem">
      <div class="card"><h3>Subscriptions</h3><div class="value" id="statSubs">-</div></div>
      <div class="card"><h3>Routing Rules</h3><div class="value" id="statRules">-</div></div>
      <div class="card"><h3>Last Run</h3><div class="value" id="statLastRun">-</div></div>
      <div class="card"><h3>Videos Added</h3><div class="value" id="statVideosAdded">-</div></div>
    </div>
    <button id="triggerBtn">▶ Run Pipeline</button>
    <div id="triggerResult" style="margin-top:0.75rem"></div>
  </section>
  <section id="subscriptions" class="page">
    <h2>Subscriptions</h2>
    <input id="subSearch" placeholder="Filter channels..." style="max-width:300px;margin-bottom:1rem">
    <div id="subList"></div>
  </section>
  <section id="rules" class="page"></section>
  <section id="config" class="page"></section>
  <section id="runs" class="page"></section>
</div>

<div id="toast" class="toast"></div>

<script>
// ---- API wrapper ----
async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...opts.headers },
  });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`${res.status}: ${body}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

function showToast(msg, type = 'error') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type}`;
  setTimeout(() => { t.className = 'toast'; }, 4000);
}

function escapeHtml(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s); return d.innerHTML;
}

// ---- Routing ----
const PAGES = ['dashboard','subscriptions','rules','config','runs'];

function navigate(page) {
  location.hash = '#' + page;
}

function renderPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById(page);
  if (el) el.classList.add('active');
  const link = document.querySelector(`.sidebar a[data-page="${page}"]`);
  if (link) link.classList.add('active');
  if (typeof renderers[page] === 'function') renderers[page]();
}

window.addEventListener('hashchange', () => {
  const page = location.hash.slice(1) || 'dashboard';
  if (PAGES.includes(page)) renderPage(page);
  else navigate('dashboard');
});

// ---- Health check ----
async function updateHealth() {
  try {
    const data = await api('/api/health');
    document.getElementById('healthDot').style.background = 'var(--success)';
    document.getElementById('healthText').textContent = 'healthy';
  } catch {
    document.getElementById('healthDot').style.background = 'var(--error)';
    document.getElementById('healthText').textContent = 'unreachable';
  }
}

// ---- Dashboard renderer ----
renderers.dashboard = async function() {
  try {
    const [subs, rules, runs] = await Promise.all([
      api('/api/subscriptions'),
      api('/api/rules'),
      api('/api/pipeline/runs'),
    ]);
    document.getElementById('statSubs').textContent = Array.isArray(subs) ? subs.length : '-';
    document.getElementById('statRules').textContent = Array.isArray(rules) ? rules.length : '-';
    if (Array.isArray(runs) && runs.length > 0) {
      const last = runs[0];
      document.getElementById('statLastRun').textContent = last.status || '-';
      document.getElementById('statVideosAdded').textContent = last.videos_added ?? '-';
    }
  } catch { /* cards stay as '-' */ }
};

// ---- Trigger ----
document.getElementById('triggerBtn')?.addEventListener('click', async function() {
  this.disabled = true; this.innerHTML = '<span class="spinner"></span>Running...';
  document.getElementById('triggerResult').innerHTML = '';
  try {
    const data = await api('/api/pipeline/trigger', { method: 'POST' });
    showToast('Pipeline started (run #' + data.run_id + ')', 'success');
    renderers.dashboard();
  } catch (e) {
    document.getElementById('triggerResult').innerHTML =
      '<span style="color:var(--error)">' + e.message + '</span>';
  } finally {
    this.disabled = false; this.textContent = '▶ Run Pipeline';
  }
});

// ---- Subscriptions renderer ----
renderers.subscriptions = async function() {
  const container = document.getElementById('subList');
  container.innerHTML = '<p style="color:var(--text2)">Loading...</p>';
  try {
    const subs = await api('/api/subscriptions');
    container.innerHTML = `<table><thead><tr><th>Channel</th><th>Channel ID</th></tr></thead>
      <tbody>${Array.isArray(subs) ? subs.map(s => `<tr data-cid="${escapeHtml(s.channel_id)}" class="sub-row" style="cursor:pointer">
        <td>${escapeHtml(s.title)}</td><td style="color:var(--text2);font-size:0.75rem">${escapeHtml(s.channel_id)}</td>
      </tr>`).join('') : ''}</tbody></table>`;
    document.getElementById('subSearch').oninput = function() {
      const q = this.value.toLowerCase();
      document.querySelectorAll('.sub-row').forEach(r => {
        r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    };
    document.querySelectorAll('.sub-row').forEach(r => {
      r.addEventListener('click', async function() {
        const cid = this.dataset.cid;
        const next = this.nextElementSibling;
        if (next && next.classList.contains('activity-row')) {
          next.remove(); return;
        }
        try {
          const acts = await api('/api/subscriptions/' + encodeURIComponent(cid) + '/activity');
          const row = document.createElement('tr'); row.className = 'activity-row';
          row.innerHTML = `<td colspan="2" style="padding:0.5rem 1rem">
            <table style="font-size:0.75rem">
              <thead><tr><th>Video</th><th>Type</th><th>Published</th></tr></thead>
              <tbody>${Array.isArray(acts) ? acts.map(a => `<tr>
                <td>${escapeHtml(a.title)}</td><td>${a.video_type}</td><td>${a.published_at}</td>
              </tr>`).join('') : ''}</tbody></table>
          </td>`;
          this.parentNode.insertBefore(row, this.nextSibling);
        } catch { showToast('Failed to load activity'); }
      });
    });
  } catch { container.innerHTML = '<p style="color:var(--error)">Failed to load subscriptions</p>'; }
};

// ---- Init ----
const renderers = {};
if (!location.hash) navigate('dashboard');
renderPage(location.hash.slice(1) || 'dashboard');
updateHealth();
setInterval(updateHealth, 30000);
</script>
</body>
</html>
