<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="vig" cx="50%" cy="44%" r="70%">
      <stop offset="0%" stop-color="#15151a"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <clipPath id="hexclip"><polygon points="687.0,512.0 599.5,663.6 424.5,663.6 337.0,512.0 424.5,360.4 599.5,360.4"/></clipPath>
    <filter id="nCyan" filterUnits="userSpaceOnUse" x="0" y="0" width="1024" height="1024">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="b"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.55"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter><filter id="nGreen" filterUnits="userSpaceOnUse" x="0" y="0" width="1024" height="1024">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="b"/>
      <feFlood flood-color="#00e676" flood-opacity="0.55"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter><filter id="nRed" filterUnits="userSpaceOnUse" x="0" y="0" width="1024" height="1024">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="b"/>
      <feFlood flood-color="#ff0033" flood-opacity="0.8"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter><filter id="nHex" filterUnits="userSpaceOnUse" x="0" y="0" width="1024" height="1024">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  

  <!-- green outputs (drawn first so the glass gate overlays the junction) -->
  <g filter="url(#nGreen)" fill="none" stroke="#00e676" stroke-width="58"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M600,512 L735,337 L895,337"/>
    <path d="M600,512 L895,512"/>
    <path d="M600,512 L735,687 L895,687"/>
  </g>

  <!-- cyan input -->
  <path d="M120,512 L405,512" fill="none" stroke="#00f0ff" stroke-width="66"
        stroke-linecap="round" filter="url(#nCyan)"/>

  <!-- glassmorphism hexagon junction -->
  <polygon points="687.0,512.0 599.5,663.6 424.5,663.6 337.0,512.0 424.5,360.4 599.5,360.4" fill="url(#glass)"/>
  <g clip-path="url(#hexclip)"><line x1="370" y1="360" x2="370" y2="664" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="402" y1="360" x2="402" y2="664" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="434" y1="360" x2="434" y2="664" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="466" y1="360" x2="466" y2="664" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="498" y1="360" x2="498" y2="664" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="530" y1="360" x2="530" y2="664" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="562" y1="360" x2="562" y2="664" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="594" y1="360" x2="594" y2="664" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="626" y1="360" x2="626" y2="664" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="658" y1="360" x2="658" y2="664" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="337" y1="384" x2="687" y2="384" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="337" y1="416" x2="687" y2="416" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="337" y1="448" x2="687" y2="448" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="337" y1="480" x2="687" y2="480" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="337" y1="512" x2="687" y2="512" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="337" y1="544" x2="687" y2="544" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="337" y1="576" x2="687" y2="576" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="337" y1="608" x2="687" y2="608" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/><line x1="337" y1="640" x2="687" y2="640" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.05"/></g>
  <polygon points="687.0,512.0 599.5,663.6 424.5,663.6 337.0,512.0 424.5,360.4 599.5,360.4" fill="none" stroke="#00f0ff" stroke-width="8"
           stroke-linejoin="round" filter="url(#nHex)"/>

  <!-- red neon core / heartbeat pulse -->
  <path d="M512,408 L512,616" fill="none" stroke="#ff0033" stroke-width="42"
        stroke-linecap="round" filter="url(#nRed)"/>
</svg>